<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meridian College — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16213E; --ink-2:#1F2D52; --ink-3:#283B66;
    --page-bg:#EAEDF3; --card-bg:#FFFFFF; --parchment:#F4EFE2;
    --gold:#C9A14A; --gold-deep:#A8823A;
    --sage:#4F7A5B; --sage-bg:#E8F0EA;
    --rust:#A8443A; --rust-bg:#F6E8E6;
    --ink-text:#1B2434; --muted:#5B6B82; --line:#DDE2EC;
    --radius:6px;
    --shadow:0 1px 2px rgba(22,33,62,0.06), 0 4px 16px rgba(22,33,62,0.06);
    --font-display:'Lora', Georgia, serif;
    --font-body:'Inter', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font-body); background:var(--page-bg); color:var(--ink-text); min-height:100vh; -webkit-font-smoothing:antialiased;}
  #app{min-height:100vh;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }

  .seal{width:40px;height:40px;border-radius:50%; border:2px solid var(--gold); display:flex;align-items:center;justify-content:center; background:radial-gradient(circle at 30% 30%, var(--ink-3), var(--ink)); color:var(--gold); font-family:var(--font-display); font-weight:700; font-size:17px; flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-text h1{font-family:var(--font-display); font-size:18px; margin:0; color:#fff; letter-spacing:0.2px;}
  .brand-text span{display:block; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-top:2px;}
  .btn{border:1px solid transparent; border-radius:5px; padding:9px 16px; font-size:13.5px; font-weight:600; transition:background .15s, color .15s, border-color .15s;}
  .btn-gold{background:var(--gold); color:var(--ink);}
  .btn-gold:hover{background:var(--gold-deep);}
  .btn-gold:disabled{opacity:0.6; cursor:default;}
  .btn-outline{background:transparent; border-color:var(--line); color:var(--ink-text);}
  .btn-outline:hover{border-color:var(--gold); color:var(--gold-deep);}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.4px;}
  .field input, .field select, .field textarea{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:5px; font-size:14px; background:#fff; color:var(--ink-text);}
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--gold);}
  .card{background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); border-top:3px solid var(--gold); padding:22px 24px;}
  .card h2{font-family:var(--font-display); font-size:18px; margin:0 0 4px 0;}
  .card .sub{color:var(--muted); font-size:13px; margin:0 0 18px 0;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); padding:9px 10px; border-bottom:1px solid var(--line); font-weight:600;}
  td{padding:11px 10px; border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700; font-family:var(--font-mono);}
  .pill-good{background:var(--sage-bg); color:var(--sage);}
  .pill-warn{background:#FBF1DE; color:var(--gold-deep);}
  .pill-bad{background:var(--rust-bg); color:var(--rust);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px;}
  @media (max-width:760px){ .grid-2,.grid-3{grid-template-columns:1fr;} }
  .empty{color:var(--muted); font-size:13.5px; padding:20px 0; text-align:center;}
  .msg{padding:10px 14px; border-radius:5px; font-size:13.5px; margin-bottom:14px;}
  .msg-error{background:var(--rust-bg); color:var(--rust); border:1px solid #e3c2bd;}
  .msg-ok{background:var(--sage-bg); color:var(--sage); border:1px solid #cfe2d3;}

  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 15% 20%, rgba(201,161,74,0.10), transparent 40%), radial-gradient(circle at 85% 80%, rgba(201,161,74,0.08), transparent 40%), var(--ink); padding:24px;}
  .login-card{width:100%; max-width:420px; background:var(--ink-2); border:1px solid rgba(201,161,74,0.25); border-radius:8px; padding:36px 34px 30px; color:#EDEFF5; box-shadow:0 20px 60px rgba(0,0,0,0.35); animation:rise .5s ease;}
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .login-head{text-align:center; margin-bottom:22px;}
  .login-head .seal{margin:0 auto 14px; width:54px; height:54px; font-size:22px;}
  .login-head h1{font-family:var(--font-display); font-size:22px; margin:0 0 4px;}
  .login-head p{font-size:12.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin:0;}
  .login-card .field label{color:#A9B2C7;}
  .login-card .field input{background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.15); color:#fff;}
  .login-card .field input::placeholder{color:#7E89A3;}
  .login-card .btn-gold{width:100%; padding:11px; font-size:14px; margin-top:6px;}
  .demo-box{margin-top:20px; padding:13px 14px; background:rgba(0,0,0,0.22); border-radius:6px; font-family:var(--font-mono); font-size:11px; color:#9FAAC2; line-height:1.7; max-height:160px; overflow-y:auto;}
  .demo-box b{color:#D7DCE8;}
  .api-base-row{margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.12);}
  .api-base-row label{font-size:10.5px; color:#7E89A3; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:5px;}
  .api-base-row input{width:100%; padding:7px 9px; font-size:11.5px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); border-radius:4px; color:#C6CCDC; font-family:var(--font-mono);}

  .shell{display:flex; min-height:100vh;}
  .sidebar{width:230px; background:var(--ink); color:#fff; flex-shrink:0; display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh;}
  .sidebar .brand{padding:0 8px 22px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:14px;}
  .nav-item{display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:5px; font-size:13.5px; font-weight:500; color:#C6CCDC; margin-bottom:3px; border-left:3px solid transparent; background:transparent; border-top:none; border-right:none; border-bottom:none; width:100%; text-align:left;}
  .nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
  .nav-item.active{background:rgba(201,161,74,0.14); color:#fff; border-left-color:var(--gold);}
  .nav-item svg{width:16px; height:16px; flex-shrink:0;}
  .sidebar-foot{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,0.1);}
  .user-chip{display:flex; align-items:center; gap:9px; padding:8px; margin-bottom:6px;}
  .user-chip .avatar{width:30px; height:30px; border-radius:50%; background:var(--gold); color:var(--ink); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; font-family:var(--font-mono);}
  .user-chip .name{font-size:13px; font-weight:600; color:#fff; line-height:1.2;}
  .user-chip .role{font-size:10.5px; color:var(--gold); text-transform:uppercase; letter-spacing:0.5px;}
  .main{flex:1; min-width:0;}
  .topbar{background:#fff; border-bottom:1px solid var(--line); padding:16px 30px; display:flex; align-items:center; justify-content:space-between;}
  .topbar h2{font-family:var(--font-display); font-size:19px; margin:0;}
  .topbar .eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:0 0 2px;}
  .topbar .conn{font-size:11px; font-family:var(--font-mono); color:var(--muted);}
  .content{padding:28px 30px 60px; max-width:1100px;}

  .id-card{position:relative; max-width:380px; border-radius:10px; overflow:hidden; background:linear-gradient(135deg, var(--ink) 0%, var(--ink-3) 100%); color:#fff; padding:22px 22px 18px; box-shadow:0 10px 30px rgba(22,33,62,0.25);}
  .id-card::before{content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%; border:18px solid rgba(201,161,74,0.10);}
  .id-card .ribbon{position:absolute; top:14px; right:-30px; background:var(--gold); color:var(--ink); font-size:10px; font-weight:700; letter-spacing:1px; padding:4px 36px; transform:rotate(40deg); text-transform:uppercase;}
  .id-card-top{display:flex; gap:14px; align-items:center; margin-bottom:16px;}
  .id-photo{width:58px; height:58px; border-radius:8px; background:rgba(201,161,74,0.18); border:1px solid rgba(201,161,74,0.4); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:21px; color:var(--gold); flex-shrink:0;}
  .id-card-top h3{margin:0; font-family:var(--font-display); font-size:17px;}
  .id-card-top p{margin:2px 0 0; font-size:11.5px; color:#B9C0D6;}
  .id-row{display:flex; justify-content:space-between; font-size:11.5px; padding:6px 0; border-top:1px dashed rgba(255,255,255,0.15);}
  .id-row span:first-child{color:#9AA4C0; text-transform:uppercase; letter-spacing:0.5px; font-size:10px;}
  .id-row span:last-child{font-family:var(--font-mono); color:#fff;}
  .id-barcode{margin-top:14px; height:26px; border-radius:3px; background:repeating-linear-gradient(90deg, #fff 0 2px, transparent 2px 5px); opacity:0.85;}
  .id-barcode-label{font-family:var(--font-mono); font-size:9.5px; letter-spacing:3px; text-align:center; margin-top:5px; color:#7E89A3;}

  .chat-wrap{display:flex; flex-direction:column; height:520px;}
  .chat-log{flex:1; overflow-y:auto; padding:6px 4px 12px; display:flex; flex-direction:column; gap:10px;}
  .bubble{max-width:78%; padding:10px 14px; border-radius:10px; font-size:13.8px; line-height:1.5; white-space:pre-wrap;}
  .bubble-user{align-self:flex-end; background:var(--ink); color:#fff; border-bottom-right-radius:2px;}
  .bubble-ai{align-self:flex-start; background:var(--parchment); color:var(--ink-text); border-bottom-left-radius:2px; border:1px solid #e9dfc6;}
  .bubble-ai.loading{color:var(--muted); font-style:italic;}
  .chat-input-row{display:flex; gap:10px; margin-top:10px; border-top:1px solid var(--line); padding-top:14px;}
  .chat-input-row input{flex:1;}

  .tt-grid{display:grid; grid-template-columns:90px repeat(5,1fr); gap:6px; font-size:12px;}
  .tt-cell{background:var(--parchment); border-radius:4px; padding:10px 8px; text-align:center; min-height:46px; display:flex; align-items:center; justify-content:center;}
  .tt-head{background:var(--ink); color:#fff; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;}
  .tt-day-label{background:var(--ink-3); color:#fff; font-weight:600; font-size:11px; border-radius:4px; display:flex; align-items:center; justify-content:center;}

  .bar-row{margin-bottom:14px;}
  .bar-row .bar-label{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .bar-track{height:9px; background:var(--line); border-radius:5px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--gold);}
  .stat-tile{background:var(--card-bg); border-top:3px solid var(--gold); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 20px; text-align:left;}
  .stat-tile .num{font-family:var(--font-display); font-size:30px; font-weight:700; color:var(--ink);}
  .stat-tile .lbl{font-size:11.5px; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin-top:3px;}
  .spinner-row{padding:40px 0; text-align:center; color:var(--muted); font-size:13.5px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =========================================================
   CONFIG
========================================================= */
let API_BASE = 'http://localhost:5000/api';

/* =========================================================
   APP STATE (everything lives in memory only)
========================================================= */
const state = {
  booted:false,
  token:null,
  user:null,        // { id, name, username, role }
  view:null,
  loginError:'', loginBusy:false,
  viewLoading:false, viewError:'',
  data:{
    profile:null, attendance:null, marks:null, timetable:null,
    facultyStudents:null,
    adminCourses:null, adminReports:null, adminFaculty:null
  },
  facultyMsg:'', facultyErr:'',
  adminMsg:'', adminErr:'',
  chatHistory:[], chatBusy:false
};

/* =========================================================
   API HELPER
========================================================= */
async function apiFetch(path, options){
  options = options || {};
  const headers = Object.assign({ 'Content-Type':'application/json' }, options.headers||{});
  if(state.token) headers['Authorization'] = 'Bearer ' + state.token;
  let res;
  try{
    res = await fetch(API_BASE + path, Object.assign({}, options, { headers }));
  }catch(networkErr){
    throw new Error('Could not reach the server at ' + API_BASE + '. Is the backend running?');
  }
  let data = null;
  try{ data = await res.json(); }catch(e){ /* no body */ }
  if(!res.ok){
    throw new Error((data && data.message) || ('Request failed (' + res.status + ')'));
  }
  return data;
}

/* =========================================================
   HELPERS
========================================================= */
function initials(name){ return (name||'').split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase(); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pct(present,total){ return total>0 ? Math.round((present/total)*100) : 0; }
function attendancePill(p){ const cls = p>=85?'pill-good':p>=70?'pill-warn':'pill-bad'; return `<span class="pill ${cls}">${p}%</span>`; }
function gradeOf(score){ if(score>=90)return 'A+'; if(score>=80)return 'A'; if(score>=70)return 'B'; if(score>=60)return 'C'; if(score>=50)return 'D'; return 'F'; }
function gradePill(score){ const g=gradeOf(score); const cls = score>=70?'pill-good':score>=50?'pill-warn':'pill-bad'; return `<span class="pill ${cls}">${g} · ${score}</span>`; }
function overallAttendanceFromArray(attArr){ let p=0,t=0; (attArr||[]).forEach(a=>{p+=a.present;t+=a.total;}); return pct(p,t); }
function overallMarksFromArray(marksArr){ if(!marksArr || !marksArr.length) return 0; return Math.round(marksArr.reduce((a,m)=>a+m.score,0)/marksArr.length); }
function findEntry(arr, subject, field){ const e=(arr||[]).find(x=>x.subject===subject); return e ? e[field] : null; }

function icon(name){
  const icons = {
    profile:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>',
    attendance:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3.5" y="4.5" width="17" height="16" rx="2"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/><path d="M7.5 13.5l2 2 4-4.5"/></svg>',
    marks:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9M11 19V5M18 19v-7"/></svg>',
    timetable:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3.5" y="4.5" width="17" height="16" rx="2"/><path d="M3.5 10h17M9.5 4.5v16M15.5 4.5v16"/></svg>',
    chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16v11H9l-5 4z"/></svg>',
    add:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>',
    list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5h14M5 12h14M5 19h14"/></svg>',
    course:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    report:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></svg>',
    logout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>',
    student:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>',
    faculty:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
  };
  return icons[name] || '';
}

/* =========================================================
   ROOT RENDER
========================================================= */
function render(){
  const app = document.getElementById('app');
  if(!state.user){ app.innerHTML = renderLogin(); return; }
  app.innerHTML = renderShell();
  if(state.view==='ai') scrollChatToBottom();
}

/* =========================================================
   LOGIN
========================================================= */
function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-head">
        <div class="seal">M</div>
        <h1>Meridian College</h1>
        <p>AI Student Assistant</p>
      </div>
      ${state.loginError ? `<div class="msg msg-error">${escapeHtml(state.loginError)}</div>` : ''}
      <form onsubmit="handleLogin(event)">
        <div class="field">
          <label>Username</label>
          <input id="loginUsername" type="text" placeholder="e.g. s101, f101, or admin" autocomplete="off" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPw" type="password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-gold" ${state.loginBusy?'disabled':''}>${state.loginBusy?'Signing in…':'Sign in'}</button>
      </form>
      <div class="demo-box">
        <div><b>Demo logins</b></div>
        <div>Admin — admin / admin123</div>
        <div>Admin — admin2 / admin123</div>
        <div>Faculty — f101…f104 / faculty123</div>
        <div>Student — s101…s104 / student123</div>
      </div>
      <div class="api-base-row">
        <label>Backend API URL</label>
        <input id="apiBaseInput" value="${escapeHtml(API_BASE)}" onchange="API_BASE=this.value.trim()" />
      </div>
    </div>
  </div>`;
}

async function handleLogin(e){
  e.preventDefault();
  const username = (document.getElementById('loginUsername').value||'').trim();
  const password = (document.getElementById('loginPw').value||'').trim();
  state.loginError=''; state.loginBusy=true; render();
  try{
    const data = await apiFetch('/auth/login', { method:'POST', body: JSON.stringify({ username, password }) });
    state.token = data.token;
    state.user = data.user;
    state.chatHistory = [];
    const defaultView = state.user.role==='student' ? 'profile' : state.user.role==='faculty' ? 'viewStudents' : 'reports';
    await goTo(defaultView);
    state.loginBusy=false;
    return;
  }catch(err){
    state.loginError = err.message;
  }
  state.loginBusy=false;
  render();
}

function logout(){
  state.token=null; state.user=null; state.view=null; state.chatHistory=[];
  state.data = { profile:null, attendance:null, marks:null, timetable:null, facultyStudents:null, adminCourses:null, adminReports:null, adminFaculty:null };
  render();
}

/* =========================================================
   APP SHELL
========================================================= */
function renderShell(){
  const nav = state.user.role==='student' ? studentNav() : state.user.role==='faculty' ? facultyNav() : adminNav();
  return `
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="seal">M</div>
        <div class="brand-text"><h1>Meridian</h1><span>College Portal</span></div>
      </div>
      <nav>${nav}</nav>
      <div class="sidebar-foot">
        <div class="user-chip">
          <div class="avatar">${initials(state.user.name)}</div>
          <div><div class="name">${escapeHtml(state.user.name)}</div><div class="role">${state.user.role}</div></div>
        </div>
        <button class="nav-item" onclick="logout()">${icon('logout')}<span>Sign out</span></button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div>
          <p class="eyebrow">${state.user.role} portal</p>
          <h2>${viewTitle()}</h2>
        </div>
        <div class="conn">${escapeHtml(API_BASE)}</div>
      </div>
      <div class="content">${renderViewWrapper()}</div>
    </div>
  </div>`;
}

function navItem(view,label,iconName){

/* =========================================================
   VIEW LOADING (fetches data from the real API, then renders)
========================================================= */
async function goTo(view){
  state.view = view;
  state.viewError = '';
  state.facultyMsg=''; state.facultyErr='';
  state.adminMsg=''; state.adminErr='';
  state.viewLoading = true;
  render();
  try{
    await loadDataForView(view);
  }catch(err){
    state.viewError = err.message;
  }
  state.viewLoading = false;
  render();
}

async function loadDataForView(view){
  if(view==='profile'){ state.data.profile = await apiFetch('/student/profile'); }
  if(view==='attendance'){
    if(!state.data.profile) state.data.profile = await apiFetch('/student/profile');
    state.data.attendance = (await apiFetch('/student/attendance')).attendance;
  }
  if(view==='marks'){
    if(!state.data.profile) state.data.profile = await apiFetch('/student/profile');
    state.data.marks = (await apiFetch('/student/marks')).marks;
  }
  if(view==='timetable'){
    if(!state.data.profile) state.data.profile = await apiFetch('/student/profile');
    state.data.timetable = (await apiFetch('/student/timetable')).timetable;
  }
  if(view==='ai'){
    if(!state.data.profile) state.data.profile = await apiFetch('/student/profile');
  }
  if(view==='viewStudents' || view==='addAttendance' || view==='updateMarks'){
    state.data.facultyStudents = await apiFetch('/faculty/students');
  }
  if(view==='manageCourses' || view==='addStudent' || view==='manageFaculty'){
    state.data.adminCourses = (await apiFetch('/admin/courses')).courses;
  }
  if(view==='manageFaculty'){
    state.data.adminFaculty = (await apiFetch('/admin/faculty')).faculty;
  }
  if(view==='reports'){
    state.data.adminReports = await apiFetch('/admin/reports');
  }
}

function renderViewWrapper(){
  if(state.viewLoading) return `<div class="spinner-row">Loading…</div>`;
  if(state.viewError) return `<div class="msg msg-error">${escapeHtml(state.viewError)}</div>`;
  return renderView();
}

function renderView(){
  if(state.user.role==='student'){
    if(state.view==='profile') return viewStudentProfile();
    if(state.view==='attendance') return viewStudentAttendance();
    if(state.view==='marks') return viewStudentMarks();
    if(state.view==='timetable') return viewStudentTimetable();
    if(state.view==='ai') return viewAIChat();
  }
  if(state.user.role==='faculty'){
    if(state.view==='addAttendance') return viewFacultyAddAttendance();
    if(state.view==='updateMarks') return viewFacultyUpdateMarks();
    if(state.view==='viewStudents') return viewFacultyStudentDetails();
  }
  if(state.user.role==='admin'){
    if(state.view==='addStudent') return viewAdminAddStudent();
    if(state.view==='manageFaculty') return viewAdminManageFaculty();
    if(state.view==='manageCourses') return viewAdminManageCourses();
    if(state.view==='reports') return viewAdminReports();
  }
  return '<div class="empty">Nothing here yet.</div>';
}

  let rows='';

    rows += `<div class="tt-day-label">Period ${p+1}</div>`;

  return `

function viewAIChat(){
  const log = state.chatHistory.map(m=>`<div class="bubble ${m.role==='user'?'bubble-user':'bubble-ai'}">${escapeHtml(m.text)}</div>`).join('');
  const loadingBubble = state.chatBusy ? `<div class="bubble bubble-ai loading">Thinking…</div>` : '';
  return `
  <div class="card">
    <h2>Ask the AI Assistant</h2>
    <p class="sub">Ask about your attendance, marks, timetable, or general college queries — ${escapeHtml(state.data.profile.name)}.</p>
    <div class="chat-wrap">
      <div class="chat-log" id="chatLog">
        ${state.chatHistory.length ? log : '<div class="empty">Try asking about your attendance, marks, or next class.</div>'}
        ${loadingBubble}
      </div>
      <form class="chat-input-row" onsubmit="handleChatSend(event)">
        <input id="chatInput" type="text" placeholder="Type your question…" autocomplete="off" ${state.chatBusy?'disabled':''} />
        <button class="btn btn-gold" type="submit" ${state.chatBusy?'disabled':''}>Send</button>
      </form>
    </div>
  </div>`;
}

function scrollChatToBottom(){ const el=document.getElementById('chatLog'); if(el) el.scrollTop = el.scrollHeight; }

async function handleChatSend(e){
  e.preventDefault();
  const input = document.getElementById('chatInput');
  const text = (input.value||'').trim();
  if(!text || state.chatBusy) return;
  state.chatHistory.push({role:'user', text});
  state.chatBusy = true;
  render(); scrollChatToBottom();
  try{
    const data = await apiFetch('/student/ask-ai', { method:'POST', body: JSON.stringify({ question:text }) });
    state.chatHistory.push({role:'assistant', text: data.answer || "I couldn't generate a response."});
  }catch(err){
    state.chatHistory.push({role:'assistant', text: 'Error: ' + err.message});
  }
  state.chatBusy = false;
  render(); scrollChatToBottom();
}

      <h2>Students at Risk</h2>
      <p class="sub">Attendance below 75%</p>
      ${r.atRisk.length ? `<table><thead><tr><th>ID</th><th>Attendance</th></tr></thead><tbody>
        ${r.atRisk.map(s=>`<tr><td>${s.studentId}</td><td>${attendancePill(s.attendancePct)}</td></tr>`).join('')}
      </tbody></table>` : '<div class="empty">No students currently at risk. 🎉</div>'}
    </div>
  </div>`;
}

/* =========================================================
   BOOT
========================================================= */
render();
</script>
</body>
</html>
